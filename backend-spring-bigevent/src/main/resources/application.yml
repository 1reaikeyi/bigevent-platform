server:
  port: 8080
spring:
  application:
    name: title
  profiles:
    active: dev
  # 数据库配置
  datasource:
    driver-class-name: ${title.datasource.driver-class-name}
    url: jdbc:mysql://${title.datasource.host}:${title.datasource.port}/${title.datasource.database}
    username: ${title.datasource.userName}
    password: ${title.datasource.password}
  # redis配置
  data:
    redis:
      host: ${title.redis.host}
      port: ${title.redis.port}
      password: ${title.redis.password}
      database: ${title.redis.database}

  # 配置文件,导入开发环境的配置文件
  config:
    import:
      classpath: application-dev.yml
  # servlet配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
# mybatis-plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
logging:
  level:
    sql: debug
# alioss配置
alioss:
  endpoint: ${title.endpoint}
  access-key-id: ${title.access-key-id}
  access-key-secret: ${title.access-key-secret}
  bucket-name: ${title.bucket-name}
# jwt配置
jwt:
  # 设置jwt签名加密时使用的秘钥
  secret-key: 华为huawei_secret_key_for_jwt_token_generation
  # 设置jwt过期时间
  ttlMillis: 864000000
  # 设置前端传递过来的令牌名称
  token-name: token

